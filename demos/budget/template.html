<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>$title$</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root { --gap: 12px; }
    body { font-family: system-ui, Arial, sans-serif; margin:0; padding:var(--gap); }
    h1,h2,h3,h4,h5,h6 { text-align: left; margin: 1.4em 0 .6em; }
    main { max-width: 900px; margin: 0 auto; line-height: 1.6; padding: var(--gap); }
    p { margin: 0.5em 0; }
    pre, code { background: #f4f4f4; font-family: monospace; padding: .2em .4em; border-radius: 4px; }
    pre { overflow-x: auto; display: block; padding: 1em; }
    blockquote { border-left: 3px solid #ccc; margin: 1em 0; padding-left: 1em; color: #555; }
    ul, ol { padding-left: 1.5em; }
    img { max-width: 100%; height: auto; display: block; margin: 1em 0; }
    table { border-collapse: collapse; width: 100%; margin-top: 1em; }
    th, td { border: 1px solid #ccc; padding: 6px 8px; }
    th { background: #f4f4f4; }
  </style>
</head>
<body>
  <h1>$title$</h1>
  <main>
  $body$
  </main>
</body>
</html>
